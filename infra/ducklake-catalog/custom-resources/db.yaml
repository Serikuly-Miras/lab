apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ducklake-catalog-cnpg-db
  namespace: ducklake-catalog
spec:
  instances: 1
  storage:
    size: 50Gi
    storageClass: longhorn

  bootstrap:
    initdb:
      database: ducklake-catalog
      owner: ducklake-catalog
      secret:
        name: ducklake-catalog-db-credentials

  imagePullPolicy: Always
  plugins:
    - enabled: true
      isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: hetzner-object-store
