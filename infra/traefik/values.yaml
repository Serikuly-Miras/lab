global:
  checkNewVersion: false
  sendAnonymousUsage: false

ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  postgres-airflow:
    port: 5434
    protocol: TCP
    expose:
      default: true
  seaweedfs-s3:
    port: 8333
    protocol: TCP
    expose:
      default: true
  starrocks-db-sn-query-entrypoint:
    port: 9030
    protocol: TCP
    expose:
      default: true
  starrocks-db-se-query-entrypoint:
    port: 9031
    protocol: TCP
    expose:
      default: true
  gitea-ssh:
    port: 2222
    protocol: TCP
    expose:
      default: true

providers:
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true
  kubernetesCRD:
    enabled: true

gateway:
  enabled: true
  listeners:
    websecure:
      protocol: HTTPS
      port: 8443
      hostname: "*.lab.s-miras.com"
      mode: Terminate
      namespacePolicy:
        from: All
      certificateRefs:
        - name: tls-vss
          group: ""
          kind: Secret

service:
  enabled: true
  type: LoadBalancer
  annotations:
    tailscale.com/expose: "true"
  spec:
    loadBalancerClass: tailscale

logs:
  access:
    enabled: false
