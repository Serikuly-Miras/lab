apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: lakekeeper-catalog-cnpg-db
spec:
  instances: 1
  storage:
    size: 50Gi
    storageClass: longhorn

  bootstrap:
    initdb:
      database: catalog
      owner: catalog
      secret:
        name: lakekeeper-catalog-cnpg-db-credentials

  imagePullPolicy: Always
  plugins:
    - enabled: true
      isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: hetzner-object-store
