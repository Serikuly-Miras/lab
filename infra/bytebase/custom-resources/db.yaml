apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bytebase-cnpg-db
spec:
  instances: 1
  storage:
    size: 10Gi
    storageClass: longhorn

  bootstrap:
    initdb:
      database: bytebase
      owner: bytebase
      secret:
        name: bytebase-db-credentials

  imagePullPolicy: Always
  plugins:
    - enabled: true
      isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: hetzner-object-store
