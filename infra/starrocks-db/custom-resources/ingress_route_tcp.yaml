apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: starrock-db-scluster-route
  namespace: starrocks-db
spec:
  entryPoints:
    - starrocks-db-query-entrypoint
  routes:
    - match: HostSNI(`*`)
      services:
        - name: starrock-db-scluster-fe-service
          port: 9030
