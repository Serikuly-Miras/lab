apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: starrocks-db-cluster-route
  namespace: starrocks-db
spec:
  entryPoints:
    - starrocks-db-query-entrypoint
  routes:
    - match: HostSNI(`*`)
      services:
        - name: starrocks-db-cluster-fe-service
          port: 9030
