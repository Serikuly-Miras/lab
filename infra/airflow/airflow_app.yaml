apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  sources:
    - repoURL: https://airflow.apache.org/
      chart: airflow
      targetRevision: 1.21.0
      helm:
        valueFiles:
          - $lab/infra/airflow/values.yaml
    - repoURL: https://github.com/Serikuly-Miras/lab.git
      ref: lab
      targetRevision: HEAD
    - repoURL: https://github.com/Serikuly-Miras/lab.git
      targetRevision: HEAD
      path: infra/airflow/custom-resources
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: airflow-api-secret-key
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: airflow-jwt-secret
    - group: apps
      kind: Deployment
      name: airflow-api-server
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1jwt-secret
    - group: apps
      kind: Deployment
      name: airflow-scheduler
      jsonPointers:
        - /data
        - /spec/template/metadata/annotations/checksum~1jwt-secretet
