spec:
  vaultAuthRef: vault-auth
  mount: kvv2
  type: kv-v2
  path: gitea
  destination:
    create: true
    name: gitea-valkey-credentials
    transformation:
      excludeRaw: true
      includes:
        - gitea_valkey_password
  refreshAfter: 10s
