apiVersion: clickhouse.com/v1alpha1
kind: KeeperCluster
metadata:
  name: ch-lab
spec:
  replicas: 1
  dataVolumeClaimSpec:
    storageClassName: "longhorn"
    resources:
      requests:
        storage: 25Gi
  containerTemplate:
    image:
      repository: docker.io/clickhouse/clickhouse
      tag: 25.8.21
---
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: ch-lab
spec:
  replicas: 1
  dataVolumeClaimSpec:
    storageClassName: "longhorn"
    resources:
      requests:
        storage: 150Gi
  keeperClusterRef:
    name: ch-lab
  settings:
    defaultUserPassword:
      passwordType: password
      secret:
        name: ch-lab-credentials
        key: password
  containerTemplate:
    image:
      repository: docker.io/clickhouse/clickhouse
      tag: 25.8.21
