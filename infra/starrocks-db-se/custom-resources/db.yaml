apiVersion: starrocks.com/v1
kind: StarRocksCluster
metadata:
  name: starrocks-db-se-cluster
spec:
  starRocksFeSpec:
    image: starrocks/fe-ubuntu:4.1-latest
    replicas: 1
    limits:
      cpu: 1
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 4Gi
    storageVolumes:
      - name: fe-meta
        storageSize: 10Gi
        mountPath: /opt/starrocks/fe/meta
      - name: fe-log
        storageSize: 5Gi
        mountPath: /opt/starrocks/fe/log
    configMapInfo:
      configMapName: starrockscluster-sample-fe-cm
      resolveKey: fe.conf
  starRocksCnSpec:
    image: starrocks/cn-ubuntu:4.1-latest
    replicas: 1
    limits:
      cpu: 1
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 4Gi
    storageVolumes:
      - name: cn-data
        storageSize: 50Gi
        mountPath: /opt/starrocks/cn/storage
      - name: cn-log
        storageSize: 5Gi
        mountPath: /opt/starrocks/cn/log
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: starrockscluster-sample-fe-cm
  labels:
    cluster: starrockscluster-sample
data:
  fe.conf: |
    LOG_DIR = ${STARROCKS_HOME}/log
    DATE = "$(date +%Y%m%d-%H%M%S)"
    JAVA_OPTS="-Dlog4j2.formatMsgNoLookups=true -Xmx8192m -XX:+UseG1GC -Xlog:gc*:${LOG_DIR}/fe.gc.log.$DATE:time"
    http_port = 8030
    rpc_port = 9020
    query_port = 9030
    edit_log_port = 9010
    mysql_service_nio_enabled = true
    sys_log_level = INFO
    # config for shared-data mode
    run_mode = shared_data
    cloud_native_storage_type = S3
    cloud_native_meta_port = 6090
    # Whether volume can be created from conf. If it is enabled, a builtin storage volume may be created.
    enable_load_volume_from_conf = false