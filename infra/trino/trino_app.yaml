apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trino
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: trino
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  sources:
    - chart: trino
      repoURL: https://trinodb.github.io/charts
      targetRevision: 1.42.1
      helm:
        values: |
          server:
            workers: 1
          additionalConfigProperties:
            - http-server.process-forwarded=true
          envFrom:
            - secretRef:
                name: trino-env
          catalogs:
            iceberg: |
              connector.name=iceberg
              iceberg.catalog.type=jdbc
              iceberg.jdbc-catalog.catalog-name=iceberg-catalog
              iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
              iceberg.jdbc-catalog.connection-url=jdbc:postgresql://iceberg-catalog-cnpg-db-rw.iceberg-catalog:5432/iceberg-catalog
              iceberg.jdbc-catalog.connection-user=iceberg-catalog
              iceberg.jdbc-catalog.connection-password=$(ICEBERG_CATALOG_PASSWORD)
              iceberg.jdbc-catalog.default-warehouse-dir=s3://iceberg
              fs.hadoop.enabled=false
              fs.native-s3.enabled=true
              s3.path-style-access=true
              s3.endpoint=seaweedfs-s3.seaweedfs:8333
              s3.aws-access-key=$(S3_AWS_ACCESS_KEY)
              s3.aws-secret-key=$(S3_AWS_SECRET_KEY)
              s3.region=us-east-1
    - repoURL: https://github.com/Serikuly-Miras/lab.git
      path: infra/trino/custom-resources
