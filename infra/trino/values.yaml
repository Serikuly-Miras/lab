server:
  workers: 1
coordinator:
  jvm:
    maxHeapSize: "3584M"
  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 1
      memory: 4Gi
worker:
  jvm:
    maxHeapSize: "3584M"
  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 1
      memory: 4Gi
additionalConfigProperties:
  - http-server.process-forwarded=true
envFrom:
  - secretRef:
      name: iceberg-s3-credentials
catalogs:
  iceberg: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://lakekeeper.lakekeeper.svc.cluster.local:8181
    fs.hadoop.enabled=false
    fs.native-s3.enabled=true
    s3.path-style-access=true
    s3.endpoint=http://seaweedfs-s3.seaweedfs:8333
    s3.aws-access-key=${ENV:S3_AWS_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_AWS_SECRET_KEY}
    s3.region=us-east-1
