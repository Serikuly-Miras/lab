apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: pg-cdc-source-db-creds-kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: vault-auth
  mount: kvv2
  type: kv-v2
  path: pg-cdc-source-db
  destination:
    create: true
    name: pg-cdc-source-db-credentials-kafka
    transformation:
      excludeRaw: true
      includes:
        - username
        - password
