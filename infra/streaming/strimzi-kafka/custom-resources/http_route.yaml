apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: strimzi-kafka-ui-route
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - "kafka-ui.lab.s-miras.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - group: ""
          kind: Service
          name: strimzi-kafka-operator-kafka-ui
          namespace: kafka
          port: 80
          weight: 1
