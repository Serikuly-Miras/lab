apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pg-cdc-source-db
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: pg-cdc-source-db
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  sources:
    - repoURL: http://gitea-http.gitea.svc.cluster.local:3000/miras/lab
      targetRevision: HEAD
      path: infra/streaming/pg-cdc-source-db/custom-resources
