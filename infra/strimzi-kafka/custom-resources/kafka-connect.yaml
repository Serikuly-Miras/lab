apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: debezium-connect
  namespace: kafka
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.2.0
  replicas: 1
  bootstrapServers: my-cluster-kafka-bootstrap:9092
  image: serikulymiras/kafka-connect-debezium:1.0.0-kafka-4.2.0-dbz-3.4.3
  externalConfiguration:
    volumes:
      - name: pg-cdc-source-db-credentials
        secret:
          secretName: pg-cdc-source-db-credentials-kafka

  config:
    group.id: debezium-connect-cluster
    offset.storage.topic: debezium-connect-offsets
    config.storage.topic: debezium-connect-configs
    status.storage.topic: debezium-connect-status
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1
