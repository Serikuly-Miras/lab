apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: debezium-connect
  namespace: kafka
  annotations:
    strimzi.io/use-connector-resources: "true"
    argocd.argoproj.io/sync-wave: "1"
spec:
  version: 4.2.0
  replicas: 1
  bootstrapServers: my-cluster-kafka-bootstrap:9092
  image: serikulymiras/kafka-connect-debezium:1.0.0-kafka-4.2.0-dbz-3.4.3
  template:
    pod:
      volumes:
        - name: pg-cdc-source-db-credentials
          secret:
            secretName: pg-cdc-source-db-credentials-kafka
    connectContainer:
      volumeMounts:
        - name: pg-cdc-source-db-credentials
          mountPath: /mnt/pg-cdc-source-db-credentials
          readOnly: true
  groupId: debezium-connect-cluster
  offsetStorageTopic: debezium-connect-offsets
  configStorageTopic: debezium-connect-configs
  statusStorageTopic: debezium-connect-status
  config:
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1
    config.providers: file
    config.providers.file.class: org.apache.kafka.common.config.provider.FileConfigProvider
