---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: kafka
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-auth
  namespace: kafka
  annotations:
    kubernetes.io/service-account.name: vault-auth
type: kubernetes.io/service-account-token
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: kafka
spec:
  vaultConnectionRef: vault-connection
  method: kubernetes
  mount: vso
  kubernetes:
    role: kafka-vso-role
    serviceAccount: vault-auth
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  namespace: kafka
  name: vault-connection
spec:
  address: http://vault.vault.svc.cluster.local:8200
  skipTLSVerify: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: pg-cdc-source-db-creds-kafka
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: vault-auth
  mount: kvv2
  type: kv-v2
  path: pg-cdc-source-db
  destination:
    create: true
    name: pg-cdc-source-db-credentials-kafka
    transformation:
      excludeRaw: true
      includes:
        - username
        - password
