apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: pg-cdc-source
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    strimzi.io/cluster: debezium-connect
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    database.hostname: pg-cdc-source-db-rw.pg-cdc-source-db.svc.cluster.local
    database.port: "5432"
    database.user: "${env:PG_CDC_USERNAME}"
    database.password: "${env:PG_CDC_PASSWORD}"
    database.dbname: pg-cdc-source-db
    database.server.name: pg-cdc-source-db
    plugin.name: pgoutput
    slot.name: debezium_slot
    publication.name: debezium_pub
    publication.autocreate.mode: disabled
    snapshot.mode: initial
    schema.history.internal.kafka.bootstrap.servers: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
    schema.history.internal.kafka.topic: schema-history.pg-cdc-source-db

    # Topic routing: one topic per table → <server>.<schema>.<table>
    topic.prefix: pg-cdc-source-db

    # Schema evolution: emit DDL change events
    include.schema.changes: "true"
