version: 2

models:
  - name: backblaze_dim_datacenter
    description: "Normalized datacenter dimension table"
    columns:
      - name: datacenter_id
        description: "Surrogate key for datacenter"
        data_tests:
          - unique
          - not_null
      - name: datacenter
        description: "Datacenter name"
        data_tests:
          - unique
          - not_null

  - name: backblaze_dim_disk_model
    description: "Normalized disk model dimension table"
    columns:
      - name: model_id
        description: "Surrogate key for disk model"
        data_tests:
          - unique
          - not_null
      - name: model
        description: "Disk model name"
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: manufacturer
        description: "Disk manufacturer name"
        data_tests:
          - dbt_utils.not_empty_string
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "manufacturer != 'Other'"

  - name: backblaze_fct
    description: "Fact table for Backblaze disk data"
    columns:
      - name: date
        description: "Date of the observation"
        data_tests:
          - not_null
      - name: serial_number
        description: "Unique identifier for the disk"
        data_tests:
          - not_null
      - name: datacenter_id
        description: "Foreign key to datacenter dimension"
        data_tests:
          - not_null
      - name: model_id
        description: "Foreign key to disk model dimension"
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date
              - serial_number
